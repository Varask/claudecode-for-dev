services:
  project-b:
    build: .
    container_name: project-b
    environment:
      - GIT_REPO=${PROJECT_B_REPO:-}
      - GIT_BRANCH=${PROJECT_B_BRANCH:-main}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    volumes:
      - project-b-code:/app/src
      - ${SSH_KEY_PATH:-~/.ssh}:/root/.ssh:ro
    ports:
      - "3001:3001"
    networks:
      - claudecode-for-dev_dev-network

volumes:
  project-b-code:

networks:
  claudecode-for-dev_dev-network:
    external: true
