services:

  # ─── Auth OAuth (usage unique / manuel) ───────────────────
  claude-auth:
    build: ./auth
    container_name: claude-auth
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - claude-auth:/home/claude/.claude

  # ─── Claude Code ──────────────────────────────────────────
  claude-code:
    build: ./claude
    container_name: claude-code
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - claude-auth:/home/claude/.claude
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dev-network

  # ─── Infra partagée ───────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./services/postgres/init:/docker-entrypoint-initdb.d
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  claude-auth:
  postgres-data:
